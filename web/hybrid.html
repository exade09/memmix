<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DegenMixer Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell hybrid-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">WaveSpeed Seedream V4.5</p>
          <h1>DegenMixer Studio</h1>
        </div>
        <div class="topbar-actions">
          <a class="ghost-link" href="/">Back to mixer</a>
          <div class="status-panel">
            <span class="pulse" aria-hidden="true"></span>
            <span id="hybridStatus">Ready</span>
          </div>
        </div>
      </header>

      <section class="hybrid-layout" aria-label="DegenMixer token image generator">
        <form id="hybridForm" class="hybrid-panel">
          <input id="imageAUrl" name="image_a_url" type="hidden" />
          <input id="imageBUrl" name="image_b_url" type="hidden" />

          <div class="hybrid-reference-grid">
            <label class="hybrid-upload">
              <span id="imageALabel">Image A</span>
              <input id="imageAFile" name="image_a" type="file" accept="image/*" />
              <img id="imageAPreview" alt="" hidden />
            </label>

            <label class="hybrid-upload">
              <span id="imageBLabel">Image B</span>
              <input id="imageBFile" name="image_b" type="file" accept="image/*" />
              <img id="imageBPreview" alt="" hidden />
            </label>
          </div>

          <label class="hybrid-field">
            <span>Narrative prompt</span>
            <textarea id="hybridPrompt" name="prompt" rows="6" maxlength="1400"></textarea>
          </label>

          <div class="hybrid-controls">
            <label class="hybrid-field compact-field">
              <span>Size</span>
              <select id="hybridSize" name="size">
                <option value="1024*1024" selected>1024 x 1024</option>
                <option value="1536*1024">1536 x 1024</option>
                <option value="1024*1536">1024 x 1536</option>
                <option value="2048*2048">2048 x 2048</option>
              </select>
            </label>

            <button id="hybridButton" class="primary-button" type="submit">
              Mix image
            </button>
          </div>
        </form>

        <section class="hybrid-result-panel" aria-live="polite">
          <div class="section-heading">
            <h2>Mix result</h2>
            <a id="hybridResultLink" class="ghost-link" href="#" target="_blank" rel="noreferrer" hidden>
              Open
            </a>
          </div>
          <div id="hybridResultSlot" class="hybrid-result-slot">
            <span>Waiting for mix</span>
          </div>
        </section>
      </section>
    </main>

    <script src="/hybrid.js"></script>
  </body>
</html>
